<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRO Kalite Kontrol Sistemi - Full Versiyon</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#1e293b;min-height:100vh;}
  .hidden{display:none!important;}

  /* Yükleniyor Ekranı */
  #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;}
  .spinner{width:50px;height:50px;border:5px solid #ede9fe;border-top-color:#4f46e5;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* AUTH */
  #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .auth-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
  .auth-card h1{font-size:22px;margin-bottom:4px;}
  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:#f1f5f9;border-radius:8px;padding:4px;}
  .tab-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-weight:600;}
  .tab-btn.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);}
  label{font-size:13px;color:#475569;display:block;margin-bottom:6px;margin-top:14px;}
  input, select{width:100%;padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;background:#f8fafc;}
  
  .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary{background:#4f46e5;color:#fff;}
  .btn-secondary{background:#f1f5f9;color:#334155;}
  .btn-success{background:#10b981;color:#fff;width:auto;margin:0;}
  .btn-danger{background:#fee2e2;color:#b91c1c;padding:6px 12px;width:auto;}
  .btn-warning{background:#fef3c7;color:#b45309;padding:6px 12px;width:auto;}

  /* APP LAYOUT */
  #app-screen{display:none;flex-direction:column;min-height:100vh;}
  .topbar{background:#1e1b4b;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;}
  .content{flex:1;padding:2rem;max-width:1400px;margin:0 auto;width:100%;}

  /* CARDS & CHIPS */
  .section-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:1.5rem;margin-bottom:1.5rem;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:768px){.form-row{grid-template-columns:1fr;}}
  
  .chip-container {display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px;}
  .chip { padding:6px 14px; background:#f1f5f9; border:1px solid #cbd5e1; border-radius:100px; font-size:12px; cursor:pointer; color:#334155; font-weight:600; white-space:nowrap; transition:0.2s; }
  .chip:hover { background:#e2e8f0; border-color:#94a3b8; }

  /* OPS GRID */
  .ops-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:12px;}
  .op-check{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1px solid #cbd5e1;border-radius:8px;cursor:pointer;background:#f8fafc;}
  .op-check input{width:18px;height:18px;accent-color:#4f46e5;}
  .op-check.checked{border-color:#4f46e5;background:#ede9fe;}

  /* TABLE */
  .table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0;margin-top:1rem;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#f8fafc;padding:12px 16px;text-align:left;font-weight:700;border-bottom:2px solid #e2e8f0;}
  td{padding:12px 16px;border-bottom:1px solid #f1f5f9;}

  /* CHART BOXES */
  .chart-container{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;}
  .chart-box{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;}
  @media(max-width:900px){.chart-container{grid-template-columns:1fr;}}

  .role-badge{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;margin-left:8px;text-transform:uppercase;}
  .role-teknisyen{background:#dbeafe;color:#1d4ed8;}
  .role-arastirmaci{background:#ede9fe;color:#6d28d9;}
  .op-pill{padding:4px 10px;background:#f1f5f9;color:#475569;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px;border:1px solid #e2e8f0; display:inline-block; margin-bottom:4px;}
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span id="loader-text">İşlem yapılıyor...</span></div>

<div id="auth-screen">
  <div class="auth-card">
    <h1>🔬 PRO Kalite Kontrol</h1>
    <p style="color:#64748b; font-size:14px; margin-bottom:1rem;">Hızlı Veri Giriş Portalı</p>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('giris')">Giriş Yap</button>
      <button class="tab-btn" onclick="switchTab('kayit')">Kayıt Ol</button>
    </div>
    <div id="tab-giris">
      <label>E-posta</label><input type="email" id="login-email" placeholder="ornek@sirket.com"/>
      <label>Şifre</label><input type="password" id="login-pass" placeholder="••••••••"/>
      <button class="btn btn-primary" onclick="doLogin()">Giriş Yap</button>
    </div>
    <div id="tab-kayit" class="hidden">
      <label>Ad Soyad</label><input type="text" id="reg-name" placeholder="Adınız Soyadınız"/>
      <label>E-posta</label><input type="email" id="reg-email" placeholder="ornek@sirket.com"/>
      <label>Şifre</label><input type="password" id="reg-pass" placeholder="En az 6 karakter"/>
      <label>Rol</label>
      <select id="reg-role"><option value="teknisyen">Teknisyen</option><option value="arastirmaci">Araştırmacı</option></select>
      <button class="btn btn-primary" onclick="doRegister()">Kayıt Ol</button>
    </div>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <h2>🚀 PRO Kalite Sistemi</h2>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="user-info" id="topbar-user"></span>
      <button onclick="doLogout()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:8px 12px; cursor:pointer; border-radius:6px;">🚪 Çıkış</button>
    </div>
  </div>

  <div class="content">
    
    <div id="panel-teknisyen" class="hidden">
      <div class="section-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
          <h3 style="margin-bottom:0;">➕ Yeni Kayıt Girişi</h3>
          <button class="btn btn-secondary" style="width:auto; margin:0; padding:8px 16px;" onclick="clearAllForm()">🧹 Formu Sıfırla</button>
        </div>
        
        <div id="quick-history-chips" class="chip-container"></div>
        
        <datalist id="kayitli-urunler"></datalist>

        <div class="form-row">
          <div>
            <label>Ürün Adı *</label>
            <input type="text" id="f-urun-adi" list="kayitli-urunler" placeholder="Ürün seçin..."/>
          </div>
          <div>
            <label>Kalem No *</label>
            <input type="text" id="f-kalem-no" placeholder="Örn: 186445"/>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Revizyon No</label>
            <input type="text" id="f-revizyon-no" placeholder="Örn: R01"/>
          </div>
          <div>
            <label>Kafile No *</label>
            <input type="text" id="f-kafile-no" placeholder="Örn: LS001"/>
          </div>
        </div>
        <div style="margin-top:10px;">
          <label>Seri No *</label>
          <input type="text" id="f-seri-no" placeholder="Örn: 10 VEYA 101-150 (Enter ile kaydet)"/>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:20px;">
          <label style="margin:0; font-weight:700;">Yapılan İşlemler *</label>
          <button class="btn btn-secondary" style="width:auto; margin:0; padding:4px 10px; font-size:11px;" onclick="toggleAllCheckboxes()">✔️ Tümünü Seç</button>
        </div>
        <div class="ops-grid" id="ops-grid"></div>

        <button class="btn btn-primary" onclick="saveOperation()">💾 Kaydı Tamamla (Enter)</button>
      </div>

      <div class="section-card">
        <h3>📋 Son Kayıtlarım</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Ürün</th><th>Rev</th><th>Kafile</th><th>Seri</th><th>İşlemler</th><th>Tarih</th><th>Aksiyon</th></tr></thead>
            <tbody id="my-ops-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="panel-arastirmaci" class="hidden">
      <div class="chart-container">
        <div class="chart-box"><canvas id="barChart"></canvas></div>
        <div class="chart-box"><canvas id="pieChart"></canvas></div>
      </div>

      <div class="section-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h3>🔍 Üretim Takip ve Analiz</h3>
          <button class="btn btn-success" onclick="exportExcel()">📥 Excel Raporu Al</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Ürün</th><th>Rev</th><th>Kalem</th><th>Kafile</th><th>Seri</th><th>Teknisyen</th><th>Tarih</th><th>Aşama</th></tr></thead>
            <tbody id="all-ops-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, query, where, orderBy, doc, setDoc, getDoc, onSnapshot, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBoOvJQPPY2fEYYKo_oCufnRyNqbmsY1s",
  authDomain: "denemelab-8e1b4.firebaseapp.com",
  projectId: "denemelab-8e1b4",
  storageBucket: "denemelab-8e1b4.firebasestorage.app",
  messagingSenderId: "383861738380",
  appId: "1:383861738380:web:a8d3d4e7fce9e9162ea4a9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ISLEMLER = ["Bütünleme","Fonksiyonel","Sızdırmazlık","ESS","Kalibrasyon","Nem Alma"];
let currentUser = null;
let currentRole = null;
let allOpsCache = [];
let myOpsCache = {}; 
let urunVeritabani = {};
let barChartInstance = null;
let pieChartInstance = null;

function showLoading(t){ document.getElementById("loader-text").innerText = t; document.getElementById("loader").style.display = "flex"; }
function hideLoading(){ document.getElementById("loader").style.display = "none"; }

// Ops Grid Oluştur
const grid = document.getElementById("ops-grid");
ISLEMLER.forEach(i => {
  const id = "op-" + i.replace(/\s/g,"");
  const div = document.createElement("div");
  div.className = "op-check";
  div.id = "div-" + id;
  div.innerHTML = `<input type="checkbox" id="${id}" value="${i}"/><span>${i}</span>`;
  div.onclick = (e) => {
    const cb = div.querySelector("input");
    if(e.target !== cb) cb.checked = !cb.checked;
    div.classList.toggle("checked", cb.checked);
  };
  grid.appendChild(div);
});

// ENTER TUŞU İLE KAYIT
document.getElementById("f-seri-no").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    saveOperation();
  }
});

// AUTH DURUMU
onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    const snap = await getDoc(doc(db,"users",user.uid));
    if(snap.exists()){
      currentRole = snap.data().role;
      document.getElementById("topbar-user").innerHTML = `👤 ${snap.data().name} <span class="role-badge role-${currentRole}">${currentRole}</span>`;
      showApp();
    }
  } else {
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
  }
});

function showApp(){
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "flex";
  startAllOpsListener(); 
  if(currentRole === "teknisyen"){
    document.getElementById("panel-teknisyen").classList.remove("hidden");
    startMyOpsListener();
  } else {
    document.getElementById("panel-arastirmaci").classList.remove("hidden");
  }
}

let allSelected = false;
window.toggleAllCheckboxes = () => {
  allSelected = !allSelected;
  ISLEMLER.forEach(i => {
    const cb = document.getElementById("op-"+i.replace(/\s/g,""));
    cb.checked = allSelected;
    document.getElementById("div-op-"+i.replace(/\s/g,"")).classList.toggle("checked", allSelected);
  });
};

window.saveOperation = async () => {
  const urunAdi = document.getElementById("f-urun-adi").value.trim();
  const kalemNo = document.getElementById("f-kalem-no").value.trim();
  const revNo = document.getElementById("f-revizyon-no").value.trim();
  const kafileNo = document.getElementById("f-kafile-no").value.trim();
  const seriNoGiris = document.getElementById("f-seri-no").value.trim();
  const secilenler = ISLEMLER.filter(i => document.getElementById("op-"+i.replace(/\s/g,"")).checked);

  if(!urunAdi || !kalemNo || !kafileNo || !seriNoGiris || secilenler.length === 0) {
    return Swal.fire('Hata','Tüm alanlar ve en az 1 işlem gerekli.','warning');
  }

  showLoading("Kaydediliyor...");
  try {
    const unameSnap = await getDoc(doc(db,"users",currentUser.uid));
    const uname = unameSnap.data().name;
    const batch = writeBatch(db);
    let seriListesi = [];

    if(seriNoGiris.includes("-")) {
      const parca = seriNoGiris.split("-");
      const bas = parseInt(parca[0]); const son = parseInt(parca[1]);
      for(let i = bas; i <= son; i++){ seriListesi.push(i.toString()); }
    } else {
      seriListesi.push(seriNoGiris);
    }

    seriListesi.forEach(s => {
      const docRef = doc(collection(db, "operations"));
      batch.set(docRef, { 
        urunAdi, kalemNo, revizyonNo: revNo, kafileNo, seriNo: s, 
        islemler: secilenler, teknisyenId: currentUser.uid, 
        teknisyenAdi: uname, tarih: serverTimestamp() 
      });
    });

    await batch.commit();
    Swal.fire({ title:'Başarılı', icon:'success', toast:true, position:'top-end', timer:1500, showConfirmButton:false });
    
    // İşlem sonrası otomatik seri artırımı veya temizlik
    if(!seriNoGiris.includes("-") && !isNaN(parseInt(seriNoGiris))) {
        document.getElementById("f-seri-no").value = (parseInt(seriNoGiris) + 1).toString();
    } else {
        document.getElementById("f-seri-no").value = "";
    }
    document.getElementById("f-seri-no").focus();

  } catch(e) { Swal.fire('Hata', e.message, 'error'); }
  hideLoading();
};

function startMyOpsListener() {
  const q = query(collection(db,"operations"));
  onSnapshot(q, (snap) => {
    const tbody = document.getElementById("my-ops-body");
    myOpsCache = {}; 
    
    let uniqueProducts = [];
    let seenKeys = new Set();

    const myDocs = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(r => r.teknisyenId === currentUser.uid)
      .sort((a, b) => {
         const tA = a.tarih?.toDate ? a.tarih.toDate().getTime() : Date.now();
         const tB = b.tarih?.toDate ? b.tarih.toDate().getTime() : Date.now();
         return tB - tA;
      });

    tbody.innerHTML = myDocs.slice(0, 15).map(r => {
      myOpsCache[r.id] = r; 
      let key = r.urunAdi + "|" + r.kafileNo;
      if(!seenKeys.has(key) && uniqueProducts.length < 5) {
          seenKeys.add(key);
          uniqueProducts.push(r);
      }

      const isNew = !r.tarih?.toDate;
      const t = isNew ? `<span style="color:#10b981; font-weight:bold;">⚡ Yeni</span>` : r.tarih.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      
      return `<tr>
        <td>${r.urunAdi}</td>
        <td>${r.revizyonNo || '-'}</td>
        <td>${r.kafileNo}</td>
        <td>${r.seriNo}</td>
        <td>${r.islemler.map(i=>`<span class="op-pill">${i}</span>`).join("")}</td>
        <td>${t}</td>
        <td style="display:flex; gap:6px;">
          <button class="btn-secondary" style="padding:4px 8px; font-size:11px; border:1px solid #cbd5e1;" onclick="quickFill('${r.id}', false)">🔄 Sıradaki Seri</button>
          <button class="btn-success" style="padding:4px 8px; font-size:11px;" onclick="quickFill('${r.id}', true)">➕ Aynı Seriye İşlem</button>
          <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="deleteRec('${r.id}')">Sil</button>
        </td>
      </tr>`;
    }).join("");

    const chipsDiv = document.getElementById("quick-history-chips");
    if(uniqueProducts.length > 0) {
        let chipsHtml = `<span style="font-size:12px; color:#64748b; align-self:center; font-weight:600;">🕒 Son Çalışılanlar:</span>`;
        uniqueProducts.forEach(p => {
            chipsHtml += `<button class="chip" onclick="quickFill('${p.id}', false)">⚡ ${p.urunAdi} (${p.kafileNo})</button>`;
        });
        chipsDiv.innerHTML = chipsHtml;
    }
  });
}

window.quickFill = (id, ayniSeriyeYeniIslem = false) => {
  const r = myOpsCache[id];
  if(!r) return;
  
  document.getElementById("f-urun-adi").value = r.urunAdi || "";
  document.getElementById("f-kalem-no").value = r.kalemNo || "";
  document.getElementById("f-revizyon-no").value = r.revizyonNo || "";
  document.getElementById("f-kafile-no").value = r.kafileNo || "";
  
  if (ayniSeriyeYeniIslem) {
    document.getElementById("f-seri-no").value = r.seriNo || ""; // Seri no KORU
    ISLEMLER.forEach(i => {
      const cb = document.getElementById("op-"+i.replace(/\s/g,""));
      cb.checked = false; 
      document.getElementById("div-op-"+i.replace(/\s/g,"")).classList.remove("checked");
    });
    Swal.fire({ title: 'Aynı Seri Yüklendi', text: 'Yeni aşamayı seçin.', icon: 'info', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
  } else {
    document.getElementById("f-seri-no").value = ""; // Seri no SİL
    ISLEMLER.forEach(i => {
      const cb = document.getElementById("op-"+i.replace(/\s/g,""));
      const isChecked = r.islemler.includes(i);
      cb.checked = isChecked;
      document.getElementById("div-op-"+i.replace(/\s/g,"")).classList.toggle("checked", isChecked);
    });
    Swal.fire({ title: 'Şablon Yüklendi', text: 'Seri numarasını girin.', icon: 'info', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
  }
  document.getElementById("f-seri-no").focus();
};

function startAllOpsListener() {
  onSnapshot(query(collection(db,"operations")), (snap) => {
    allOpsCache = snap.docs.map(d=>({id: d.id, ...d.data()})).sort((a,b)=>{
        const tA = a.tarih?.toDate ? a.tarih.toDate() : 0;
        const tB = b.tarih?.toDate ? b.tarih.toDate() : 0;
        return tB - tA;
    });
    updateDatalist(allOpsCache);
    if(currentRole === "arastirmaci") {
        renderAllOps();
        updateCharts(allOpsCache);
    }
  });
}

function renderAllOps() {
  const tbody = document.getElementById("all-ops-body");
  tbody.innerHTML = allOpsCache.slice(0, 50).map(r => {
    const t = r.tarih?.toDate ? r.tarih.toDate().toLocaleDateString("tr-TR") : "-";
    return `<tr>
        <td>${r.urunAdi}</td>
        <td>${r.revizyonNo || '-'}</td>
        <td>${r.kalemNo}</td>
        <td>${r.kafileNo}</td>
        <td>${r.seriNo}</td>
        <td>${r.teknisyenAdi}</td>
        <td>${t}</td>
        <td><button class="btn-warning" onclick="viewTracker('${r.kafileNo}','${r.seriNo}')">Takip</button></td>
    </tr>`;
  }).join("");
}

function updateCharts(data) {
    const counts = {}; ISLEMLER.forEach(i => counts[i] = data.filter(r => r.islemler.includes(i)).length);
    if(barChartInstance) barChartInstance.destroy();
    barChartInstance = new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: { labels: ISLEMLER, datasets: [{ label: 'Test Sayısı', data: Object.values(counts), backgroundColor: '#4f46e5' }] }
    });
}

window.viewTracker = (kafile, seri) => {
  const records = allOpsCache.filter(r => r.kafileNo === kafile && r.seriNo === seri);
  let done = new Set(); records.forEach(r => r.islemler.forEach(i => done.add(i)));
  let html = `<div style="text-align:left;">`;
  ISLEMLER.forEach(op => {
    const isDone = done.has(op);
    html += `<div style="display:flex; justify-content:space-between; padding:8px; margin-bottom:4px; border-radius:6px; background:${isDone?'#d1fae5':'#f1f5f9'}; border-left:4px solid ${isDone?'#10b981':'#cbd5e1'}"><span>${op}</span><span>${isDone?'✅':'⏳'}</span></div>`;
  });
  html += `</div>`;
  Swal.fire({ title: `İzlenebilirlik: ${kafile} - ${seri}`, html: html });
};

window.exportExcel = () => {
    const ws = XLSX.utils.json_to_sheet(allOpsCache.map(r => ({ Ürün: r.urunAdi, Rev: r.revizyonNo, Kalem: r.kalemNo, Kafile: r.kafileNo, Seri: r.seriNo, İşlemler: r.islemler.join(", "), Teknisyen: r.teknisyenAdi })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Kayıtlar");
    XLSX.writeFile(wb, "Kalite_Rapor.xlsx");
};

window.deleteRec = async (id) => { if(confirm("Kaydı silecek misiniz?")) await deleteDoc(doc(db,"operations",id)); };
function updateDatalist(data) {
    data.forEach(r => { if(r.urunAdi) urunVeritabani[r.urunAdi] = r.kalemNo; });
    document.getElementById("kayitli-urunler").innerHTML = Object.keys(urunVeritabani).map(u => `<option value="${u}">`).join("");
}
document.getElementById("f-urun-adi").addEventListener("change", function(){ if(urunVeritabani[this.value]) document.getElementById("f-kalem-no").value = urunVeritabani[this.value]; });

window.clearAllForm = () => { 
  document.querySelectorAll("input[type=text]").forEach(el => el.value="");
  document.querySelectorAll("input[type=checkbox]").forEach(el => { el.checked=false; });
  document.querySelectorAll(".op-check").forEach(el => el.classList.remove("checked"));
};
window.switchTab = (t) => {
    document.getElementById("tab-giris").classList.toggle("hidden", t!=='giris');
    document.getElementById("tab-kayit").classList.toggle("hidden", t!=='kayit');
};
window.doLogin = async () => {
    showLoading("Giriş...");
    try { await signInWithEmailAndPassword(auth, document.getElementById("login-email").value, document.getElementById("login-pass").value); }
    catch(e){ Swal.fire("Hata", "Giriş başarısız", "error"); }
    hideLoading();
};
window.doRegister = async () => {
    showLoading("Kayıt...");
    try {
        const res = await createUserWithEmailAndPassword(auth, document.getElementById("reg-email").value, document.getElementById("reg-pass").value);
        await setDoc(doc(db,"users",res.user.uid), {name: document.getElementById("reg-name").value, role: document.getElementById("reg-role").value});
        Swal.fire("Başarılı", "Kullanıcı oluşturuldu", "success");
    } catch(e){ Swal.fire("Hata", e.message, "error"); }
    hideLoading();
};
window.doLogout = () => signOut(auth);
</script>
</body>
</html>
